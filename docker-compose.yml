version: '3.8'

services:
  python-microservice:
    build:
      context: ./python-microservice
      dockerfile: Dockerfile
    container_name: docprocessing-python-service
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    volumes:
      - ./yolov8n.pt:/microservice/yolov8n.pt
    networks:
      - docprocessing-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  docprocessing-network:
    driver: bridge
